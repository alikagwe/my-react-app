name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: my-react-app

      - name: Run tests
        run: npm test -- --watchAll=false
        working-directory: my-react-app

      - name: Build app
        run: npm run build
        working-directory: my-react-app
